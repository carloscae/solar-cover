name: Release

# Cuts a GitHub release whenever the integration's manifest version changes on
# main. HACS installs the integration from the latest release tag, so creating
# the tagged release is all that is required -- no build or zip asset is needed
# (hacs.json does not set zip_release).

on:
  push:
    branches: [main]
    paths:
      - custom_components/solar_cover/manifest.json
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    name: Tag and release on version bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version from manifest
        id: version
        run: |
          version=$(jq -r .version custom_components/solar_cover/manifest.json)
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::Could not read version from manifest.json"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether the release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          version="v${{ steps.version.outputs.version }}"
          prev=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | head -1)

          if [ -n "$prev" ]; then
            range="${prev}..HEAD"
          else
            range="HEAD"
          fi

          features=$(git log $range --pretty=format:"%s" | grep -E "^feat(\(.+\))?[!]?:" | sed 's/^feat[^:]*: /- /')
          fixes=$(git log $range --pretty=format:"%s" | grep -E "^fix(\(.+\))?[!]?:" | sed 's/^fix[^:]*: /- /')
          breaking=$(git log $range --pretty=format:"%s" | grep -E "^[a-z]+(\(.+\))?!:" | sed 's/^[^:]*!: /- /')

          notes=""

          if [ -n "$breaking" ]; then
            notes="${notes}## Breaking changes\n${breaking}\n\n"
          fi
          if [ -n "$features" ]; then
            notes="${notes}## What's new\n${features}\n\n"
          fi
          if [ -n "$fixes" ]; then
            notes="${notes}## Bug fixes\n${fixes}\n\n"
          fi

          if [ -z "$notes" ]; then
            notes="Maintenance release — see commit history for details."
          fi

          notes="${notes}**Full changelog:** https://github.com/${{ github.repository }}/compare/${prev}...${version}"

          printf "%b" "$notes" > release_notes.md

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release_notes.md \
            --target "${{ github.sha }}"
